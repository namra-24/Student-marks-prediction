<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Garden | 10-Stage Infinite Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e3a8a 0%, #7e22ce 50%, #db2777 100%);
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --accent: #22d3ee;
            --text: #ffffff;
            --soft-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .doodle-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            width: 95%;
            max-width: 650px;
            margin: 40px 10px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: var(--soft-shadow);
            animation: fadeIn 0.8s ease-out;
        }

        /* --- GARDEN DISPLAY --- */
        .garden-box {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #garden-display {
            font-size: 3rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
        }

        .plant {
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 8px var(--accent));
        }

        .new-growth {
            animation: popIn 0.5s ease-out;
            border-bottom: 2px solid var(--accent);
        }

        /* --- HABIT CARDS --- */
        .habit-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .habit-card.visible { opacity: 1; transform: translateY(0); }

        .date-scroller {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 0;
        }

        .date-scroller::-webkit-scrollbar { height: 4px; }
        .date-scroller::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .date-bubble {
            flex: 0 0 45px;
            height: 55px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .date-bubble.active {
            background: var(--accent);
            color: #003e4d;
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent);
        }

        .add-habit-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input {
            flex: 1; padding: 14px; border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2); color: white; outline: none;
        }
        .main-btn {
            background: var(--accent); border: none; border-radius: 12px;
            padding: 0 20px; cursor: pointer; font-weight: 600;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <svg class="doodle-bg" viewBox="0 0 100 100">
        <circle cx="10" cy="10" r="1" fill="white"/>
        <path d="M70 10 Q 75 5, 80 10" stroke="white" fill="none" stroke-width="0.3"/>
    </svg>

    <div class="container">
        <div class="garden-box">
            <div id="garden-display"></div>
            <h3 style="margin: 5px 0 0 0;"><span id="growth-label">Dormant</span> (Level <span id="level-count">1</span>)</h3>
            <p style="font-size: 0.75rem; opacity: 0.7;">Complete 10 steps to add a permanent flower!</p>
        </div>

        <div class="add-habit-box">
            <input type="text" id="habitInput" placeholder="New Habit Name...">
            <button class="main-btn" onclick="addHabit()">Plant</button>
        </div>

        <div id="habitList"></div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('bloom_infinite_v4')) || [];

        // EXACT 10 STAGES FROM PREVIOUS CODE
        const growthStages = [
            { emoji: '🌑', label: 'Dormant' },
            { emoji: '🪴', label: 'Sown' },
            { emoji: '🌱', label: 'Sprout' },
            { emoji: '🌿', label: 'Developing' },
            { emoji: '🍃', label: 'Leafy' },
            { emoji: '🎍', label: 'Tall' },
            { emoji: '🌳', label: 'Strong' },
            { emoji: '✨', label: 'Sparkling' },
            { emoji: '🌸', label: 'Blooming' },
            { emoji: '🌺', label: 'Full Bloom' }
        ];

        function getDatesInMonth() {
            const now = new Date();
            const dates = [];
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) {
                dates.push(new Date(now.getFullYear(), now.getMonth(), i).toISOString().split('T')[0]);
            }
            return dates;
        }
        const monthDates = getDatesInMonth();

        function addHabit() {
            const input = document.getElementById('habitInput');
            if (!input.value.trim()) return;
            habits.push({ name: input.value.trim(), completedDates: [] });
            input.value = "";
            saveAndRender();
        }

        function toggleDate(hIdx, date) {
            const habit = habits[hIdx];
            const dIdx = habit.completedDates.indexOf(date);
            dIdx > -1 ? habit.completedDates.splice(dIdx, 1) : habit.completedDates.push(date);
            saveAndRender();
        }

        function updateGarden() {
            let totalCompletions = 0;
            habits.forEach(h => totalCompletions += h.completedDates.length);

            const stagesCount = growthStages.length; // 10
            const fullPlantsCount = Math.floor(totalCompletions / stagesCount);
            const currentStageIndex = totalCompletions % stagesCount;

            const display = document.getElementById('garden-display');
            display.innerHTML = '';

            // 1. Render all fully grown flowers (The Loops)
            for (let i = 0; i < fullPlantsCount; i++) {
                const span = document.createElement('span');
                span.className = 'plant';
                span.innerText = '🌺'; 
                display.appendChild(span);
            }

            // 2. Render the current growing plant
            if (habits.length > 0 || currentStageIndex > 0) {
                const activeSpan = document.createElement('span');
                activeSpan.className = 'plant new-growth';
                activeSpan.id = 'active-plant';
                activeSpan.innerText = growthStages[currentStageIndex].emoji;
                display.appendChild(activeSpan);
                document.getElementById('growth-label').innerText = growthStages[currentStageIndex].label;
            } else {
                display.innerHTML = '<span class="plant">🌑</span>';
                document.getElementById('growth-label').innerText = 'Dormant';
            }

            document.getElementById('level-count').innerText = fullPlantsCount + 1;
        }

        function renderHabits() {
            const list = document.getElementById('habitList');
            list.innerHTML = '';
            habits.forEach((habit, hIdx) => {
                const card = document.createElement('div');
                card.className = 'habit-card';
                const bubbles = monthDates.map(date => {
                    const active = habit.completedDates.includes(date) ? 'active' : '';
                    return `<div class="date-bubble ${active}" onclick="toggleDate(${hIdx}, '${date}')">
                                <span style="font-size:0.6rem; opacity:0.6;">Day</span>
                                ${date.split('-')[2]}
                            </div>`;
                }).join('');

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong>${habit.name}</strong>
                        <span onclick="deleteHabit(${hIdx})" style="cursor:pointer; opacity:0.4;">✕</span>
                    </div>
                    <div class="date-scroller">${bubbles}</div>`;
                list.appendChild(card);
            });
            initScrollObserver();
        }

        function deleteHabit(idx) {
            if(confirm("Delete this habit?")) {
                habits.splice(idx, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('bloom_infinite_v4', JSON.stringify(habits));
            renderHabits();
            updateGarden();
        }

        function initScrollObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.habit-card').forEach(c => observer.observe(c));
        }

        // Initialize
        renderHabits();
        updateGarden();

        // Auto-scroll scrollers to today
        window.onload = () => {
            const today = new Date().getDate();
            setTimeout(() => {
                document.querySelectorAll('.date-scroller').forEach(s => {
                    s.scrollLeft = (today - 3) * 55;
                });
            }, 300);
        };
    </script>
</body>
</html>
